<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal da Fiscalização</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; margin: 0; }
        .header { background-color: #1e3a8a; color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-decoration: none; color: #333; display: block; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); border-bottom: 4px solid #1e3a8a; }
        .icone { font-size: 40px; margin-bottom: 10px; }
        .login-box { max-width: 400px; margin: 100px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background-color: #1e3a8a; color: white; cursor: pointer; font-weight: bold; border: none; }
        button:hover { background-color: #152c6a; }
        #portal-content { display: none; }
    </style>
</head>
<body>

    <!-- Tela de Login -->
    <div id="login-section" class="login-box">
        <h2 style="text-align: center; color: #1e3a8a;">Portal Municipal</h2>
        <input type="email" id="email" placeholder="Seu e-mail">
        <input type="password" id="senha" placeholder="Sua senha">
        <button onclick="fazerLogin()">Entrar</button>
    </div>

    <!-- Tela do Portal (escondida até fazer login) -->
    <div id="portal-content">
        <div class="header">
            <h2>Portal da Fiscalização</h2>
            <div>
                <span id="nome-usuario" style="margin-right: 20px;"></span>
                <button onclick="sair()" style="width: auto; padding: 5px 15px; background: #dc2626;">Sair</button>
            </div>
        </div>
        
        <div class="container">
            <h3 style="color: #4b5563;">Sistemas Disponíveis para Você:</h3>
            <div id="lista-sistemas" class="grid">
                <!-- Os aplicativos vão aparecer aqui automaticamente -->
            </div>
        </div>
    </div>

    <script>
        // COLE SUAS CHAVES AQUI
        const SUPABASE_URL = 'https://zgwnzneigurfihdtmzmf.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_VrOtcpI6FlHyW4GGYlUGGg_cLWdni1N';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fazerLogin() {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            
            const { error } = await supabase.auth.signInWithPassword({ email, password: senha });
            if (error) {
                alert("Erro: E-mail ou senha incorretos.");
            } else {
                iniciarPortal();
            }
        }

        async function sair() {
            await supabase.auth.signOut();
            document.getElementById('portal-content').style.display = 'none';
            document.getElementById('login-section').style.display = 'block';
        }

        async function iniciarPortal() {
            // Pega o usuário logado
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return;

            document.getElementById('login-section').style.display = 'none';
            document.getElementById('portal-content').style.display = 'block';
            document.getElementById('nome-usuario').innerText = "Usuário: " + user.email;

            // Busca qual é o cargo deste usuário na tabela perfis
            let { data: perfil } = await supabase.from('perfis').select('cargo').eq('id', user.id).single();
            
            // Se o usuário não tiver perfil criado ainda, definimos como 'auditor' provisório
            let cargoDoUsuario = perfil ? perfil.cargo : 'auditor';

            // Busca os sistemas que contêm o cargo do usuário na lista de permitidos
            const { data: sistemas } = await supabase.from('sistemas')
                                             .select('*')
                                             .contains('cargos_permitidos', [cargoDoUsuario]);

            // Desenha os aplicativos na tela
            const divSistemas = document.getElementById('lista-sistemas');
            divSistemas.innerHTML = ''; // Limpa a tela
            
            if (sistemas.length === 0) {
                divSistemas.innerHTML = "<p>Nenhum sistema liberado para seu cargo.</p>";
            }

            sistemas.forEach(sis => {
                divSistemas.innerHTML += `
                    <a href="${sis.url}" target="_blank" class="card">
                        <div class="icone">${sis.icone}</div>
                        <h3 style="margin: 0 0 10px 0;">${sis.nome}</h3>
                        <p style="margin: 0; color: #6b7280; font-size: 14px;">Acessar sistema →</p>
                    </a>
                `;
            });
        }

        // Verifica se o usuário já estava logado ao abrir a página
        window.onload = async function() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) iniciarPortal();
        }
    </script>
</body>
</html>
